<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2563eb">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>Crossword Flashcards</title>
<style>
  :root{
    --bg:#0f172a; --panel:#1e293b; --panel2:#334155; --txt:#e2e8f0;
    --muted:#94a3b8; --accent:#2563eb; --accent2:#3b82f6;
    --good:#22c55e; --bad:#ef4444; --hard:#f59e0b;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--txt);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    display:flex; flex-direction:column;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
  }
  header{padding:14px 16px 8px;text-align:center}
  header h1{margin:0;font-size:18px;letter-spacing:.5px}
  header p{margin:2px 0 0;font-size:12px;color:var(--muted)}
  main{flex:1;overflow-y:auto;padding:8px 16px 16px}
  .tab{display:none}
  .tab.active{display:block}

  /* generic controls */
  .row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:10px 0}
  button{
    font:inherit;color:var(--txt);background:var(--panel2);border:none;
    border-radius:10px;padding:11px 14px;cursor:pointer;flex:0 0 auto;
  }
  button:active{transform:scale(.97)}
  button.primary{background:var(--accent)}
  .seg{display:inline-flex;background:var(--panel);border-radius:10px;padding:3px}
  .seg button{background:transparent;border-radius:8px;padding:8px 12px;font-size:13px}
  .seg button.on{background:var(--accent)}

  /* flashcard */
  .card{
    background:var(--panel);border-radius:18px;min-height:230px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:24px;margin:6px 0;cursor:pointer;
    box-shadow:0 8px 24px rgba(0,0,0,.35);
  }
  .card .big{font-size:40px;font-weight:700;letter-spacing:2px}
  .card .med{font-size:22px;line-height:1.35}
  .card .tag{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
  .card .hint{font-size:11px;color:var(--muted);margin-top:16px}
  .counter{text-align:center;color:var(--muted);font-size:12px;margin-top:4px}
  .hardflag{color:var(--hard);font-weight:700}

  /* quiz */
  .qword{font-size:34px;font-weight:700;letter-spacing:2px;text-align:center;margin:8px 0}
  .qclue{font-size:20px;text-align:center;margin:8px 0;line-height:1.35}
  .qtag{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;text-align:center}
  .opts{display:flex;flex-direction:column;gap:10px;margin-top:14px}
  .opt{background:var(--panel);text-align:left;padding:14px;border-radius:12px;font-size:16px}
  .opt.correct{background:var(--good);color:#04210f}
  .opt.wrong{background:var(--bad);color:#2a0707}
  .opt:disabled{opacity:1}
  .feedback{text-align:center;min-height:22px;margin-top:12px;font-weight:600}

  /* stats */
  .summary{display:flex;gap:8px;margin:8px 0}
  .stat{flex:1;background:var(--panel);border-radius:12px;padding:12px;text-align:center}
  .stat b{display:block;font-size:22px}
  .stat span{font-size:11px;color:var(--muted)}
  .wlist{margin-top:10px}
  .wrow{display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid #1e293b}
  .wrow .w{width:62px;font-weight:700;flex:0 0 auto}
  .wrow .bar{flex:1;height:10px;border-radius:6px;background:var(--panel2);overflow:hidden;display:flex}
  .wrow .bar .g{background:var(--good)}
  .wrow .bar .b{background:var(--bad)}
  .wrow .cnt{font-size:12px;color:var(--muted);width:74px;text-align:right;flex:0 0 auto}
  .wrow .h{color:var(--hard)}

  /* bottom nav */
  nav{
    display:flex;background:var(--panel);border-top:1px solid #334155;
    padding-bottom:env(safe-area-inset-bottom);
  }
  nav button{flex:1;background:transparent;border-radius:0;padding:12px 0;font-size:13px;color:var(--muted)}
  nav button.on{color:var(--accent2);font-weight:700}
</style>
</head>
<body>
<header>
  <h1>Crossword Flashcards</h1>
  <p>The 100 most common NYT crossword answers</p>
</header>

<main>
  <!-- FLASHCARDS -->
  <section id="tab-cards" class="tab active">
    <div class="row">
      <div class="seg" id="cardDir">
        <button data-dir="wm" class="on">Word → Meaning</button>
        <button data-dir="mw">Meaning → Word</button>
      </div>
    </div>
    <div class="card" id="card">
      <div class="tag" id="cardTag">Word</div>
      <div class="big" id="cardFront">—</div>
      <div class="hint">Tap to flip</div>
    </div>
    <div class="counter" id="cardCounter"></div>
    <div class="row">
      <button id="prevBtn">◀ Prev</button>
      <button id="hardBtn">☆ Mark hard</button>
      <button id="nextBtn">Next ▶</button>
    </div>
    <div class="row">
      <button id="shuffleBtn">🔀 Shuffle</button>
    </div>
  </section>

  <!-- QUIZ -->
  <section id="tab-quiz" class="tab">
    <div class="row">
      <div class="seg" id="quizDir">
        <button data-dir="wm" class="on">Word → Meaning</button>
        <button data-dir="mw">Meaning → Word</button>
      </div>
    </div>
    <div class="qtag" id="quizTag"></div>
    <div id="quizPrompt"></div>
    <div class="opts" id="quizOpts"></div>
    <div class="feedback" id="quizFeedback"></div>
    <div class="row">
      <button class="primary" id="quizNext">Next question ▶</button>
    </div>
  </section>

  <!-- STATS -->
  <section id="tab-stats" class="tab">
    <div class="summary">
      <div class="stat"><b id="sAnswered">0</b><span>answered</span></div>
      <div class="stat"><b id="sAccuracy">—</b><span>accuracy</span></div>
      <div class="stat"><b id="sMisses">0</b><span>misses</span></div>
    </div>
    <div class="wlist" id="wlist"></div>
    <div class="row">
      <button id="resetBtn">Reset all progress</button>
    </div>
  </section>
</main>

<nav id="nav">
  <button data-tab="cards" class="on">Cards</button>
  <button data-tab="quiz">Quiz</button>
  <button data-tab="stats">Stats</button>
</nav>

<script>
/* ---------- data: 100 most common NYT crossword answers ---------- */
const WORDS = [
  {w:"ERA", c:"Historical period"},
  {w:"AREA", c:"Region or zone"},
  {w:"ERE", c:"Before, to a poet"},
  {w:"ONE", c:"Lowest counting number"},
  {w:"ELI", c:"Whitney of the cotton gin"},
  {w:"ERIE", c:"Great Lake bordering Ohio"},
  {w:"ALOE", c:"Soothing succulent"},
  {w:"OREO", c:"Sandwich cookie"},
  {w:"ARIA", c:"Operatic solo"},
  {w:"ETA", c:"Arrival guess, for short"},
  {w:"IRE", c:"Wrath"},
  {w:"ALE", c:"Pub draft"},
  {w:"ANTE", c:"Poker pot starter"},
  {w:"ESS", c:"Curve shaped like a letter"},
  {w:"OLE", c:"Bullring cheer"},
  {w:"EKE", c:"Barely make, with 'out'"},
  {w:"EPEE", c:"Fencing blade"},
  {w:"ASEA", c:"Out on the ocean"},
  {w:"ETE", c:"Summer, in Paris"},
  {w:"ODE", c:"Poem of praise"},
  {w:"ECO", c:"Green prefix"},
  {w:"ENO", c:"Brian of ambient music"},
  {w:"ESPN", c:"Sports cable channel"},
  {w:"NASA", c:"Moon-landing org."},
  {w:"ELSE", c:"Otherwise"},
  {w:"IDO", c:"Altar vow (2 wds.)"},
  {w:"OAR", c:"Rowboat propeller"},
  {w:"ARC", c:"Curved path"},
  {w:"ACME", c:"Peak; Coyote's supplier"},
  {w:"ADO", c:"Fuss or bother"},
  {w:"AGO", c:"In the past"},
  {w:"AHA", c:"Eureka!"},
  {w:"AJAR", c:"Slightly open"},
  {w:"AMEN", c:"End of a prayer"},
  {w:"ANEW", c:"Once more"},
  {w:"ANTI", c:"Opposed to"},
  {w:"APSE", c:"Church recess"},
  {w:"ARID", c:"Bone-dry"},
  {w:"ASH", c:"Fire residue"},
  {w:"ATOM", c:"Tiny bit of matter"},
  {w:"AVID", c:"Keen, as a fan"},
  {w:"AWE", c:"Sense of wonder"},
  {w:"AXE", c:"Chopping tool"},
  {w:"EBB", c:"Recede, as the tide"},
  {w:"EDEN", c:"Biblical garden"},
  {w:"EEL", c:"Snakelike fish"},
  {w:"EGO", c:"Sense of self"},
  {w:"ELM", c:"Shade tree"},
  {w:"EMIT", c:"Give off, as light"},
  {w:"EPIC", c:"Grand in scale"},
  {w:"ERR", c:"Make a mistake"},
  {w:"ETCH", c:"Engrave, as glass"},
  {w:"EWE", c:"Female sheep"},
  {w:"EYE", c:"Needle's threading hole"},
  {w:"IBIS", c:"Long-billed wading bird"},
  {w:"ICON", c:"Desktop image; revered figure"},
  {w:"IDEA", c:"Brainstorm result"},
  {w:"IDLE", c:"Not in use"},
  {w:"IGLOO", c:"Snow-block house"},
  {w:"ILK", c:"Kind or sort"},
  {w:"IMP", c:"Mischievous sprite"},
  {w:"INTO", c:"Really fond of"},
  {w:"ION", c:"Charged particle"},
  {w:"IOTA", c:"Tiny amount"},
  {w:"IRIS", c:"Eye part; spring flower"},
  {w:"IRK", c:"Annoy"},
  {w:"ISLE", c:"Small island"},
  {w:"ITEM", c:"Entry on a list"},
  {w:"NAP", c:"Quick snooze"},
  {w:"NEAT", c:"Tidy"},
  {w:"NEON", c:"Glowing sign gas"},
  {w:"NEST", c:"Bird's home"},
  {w:"NIL", c:"Nothing, in soccer"},
  {w:"NOD", c:"Agree silently"},
  {w:"NOOK", c:"Cozy corner"},
  {w:"NOR", c:"Neither's partner"},
  {w:"NOSE", c:"Facial smeller"},
  {w:"OAT", c:"Cereal grain"},
  {w:"OBOE", c:"Double-reed woodwind"},
  {w:"ODOR", c:"Smell"},
  {w:"OGRE", c:"Fairy-tale brute"},
  {w:"OHIO", c:"Buckeye State"},
  {w:"OINK", c:"Pigpen sound"},
  {w:"OMEN", c:"Sign of things to come"},
  {w:"ONCE", c:"A single time"},
  {w:"OPAL", c:"Iridescent gem"},
  {w:"OPEN", c:"Not shut"},
  {w:"ORB", c:"Sphere"},
  {w:"ORCA", c:"Killer whale"},
  {w:"ORE", c:"Mineral deposit"},
  {w:"OUST", c:"Drive from office"},
  {w:"OVAL", c:"Egg shape"},
  {w:"OWE", c:"Be in debt"},
  {w:"OWL", c:"Nocturnal hooter"},
  {w:"UNDO", c:"Reverse, as an edit"},
  {w:"UNIT", c:"Single item"},
  {w:"UNTO", c:"To, in olden days"},
  {w:"URN", c:"Coffee dispenser"},
  {w:"USE", c:"Put to work"},
  {w:"UTAH", c:"Beehive State"}
];

/* ---------- persistence (cw_flashcards_v2) ---------- */
const LS_KEY = "cw_flashcards_v2";
let state = loadState();
function loadState(){
  try{
    const s = JSON.parse(localStorage.getItem(LS_KEY));
    if(s && s.stats && s.hard) return s;
  }catch(e){}
  return {stats:{}, hard:{}};
}
function saveState(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){}
}
function rec(w){ return state.stats[w] || (state.stats[w] = {right:0, wrong:0}); }

/* ---------- helpers ---------- */
const $ = (id)=>document.getElementById(id);
function shuffle(a){
  a = a.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function byWord(w){ return WORDS.find(x=>x.w===w); }

/* weight a word for selection: unseen, missed, and "hard" words surface more */
function weight(w){
  const r = rec(w);
  let weight = 1;
  if(state.hard[w]) weight += 3;
  weight += r.wrong * 2;                 // missed often -> show often
  if(r.right + r.wrong === 0) weight += 2;   // never seen
  if(r.right >= 3 && r.wrong === 0) weight *= 0.25; // mastered -> show rarely
  return Math.max(0.1, weight);
}
function weightedPick(){
  const total = WORDS.reduce((s,x)=>s+weight(x.w),0);
  let t = Math.random()*total;
  for(const x of WORDS){ t -= weight(x.w); if(t<=0) return x; }
  return WORDS[WORDS.length-1];
}

/* ---------- tab switching ---------- */
document.querySelectorAll("#nav button").forEach(b=>{
  b.onclick = ()=>{
    const tab = b.dataset.tab;
    document.querySelectorAll("#nav button").forEach(x=>x.classList.toggle("on", x===b));
    document.querySelectorAll(".tab").forEach(s=>s.classList.remove("active"));
    $("tab-"+tab).classList.add("active");
    if(tab==="stats") renderStats();
  };
});

/* ---------- flashcards ---------- */
let cardOrder = shuffle(WORDS.map(x=>x.w));
let cardIdx = 0;
let cardFlipped = false;
let cardDir = "wm"; // wm = word->meaning, mw = meaning->word

function currentCardWord(){ return cardOrder[cardIdx]; }
function renderCard(){
  const w = currentCardWord();
  const item = byWord(w);
  const frontIsWord = (cardDir === "wm") ? !cardFlipped : cardFlipped;
  $("cardTag").textContent = frontIsWord ? "Word" : "Clue";
  const el = $("cardFront");
  if(frontIsWord){ el.textContent = item.w; el.className = "big"; }
  else { el.textContent = item.c; el.className = "med"; }
  const hardMark = state.hard[w] ? ' <span class="hardflag">★ hard</span>' : '';
  $("cardCounter").innerHTML = (cardIdx+1)+" / "+cardOrder.length + hardMark;
  $("hardBtn").textContent = state.hard[w] ? "★ Unmark hard" : "☆ Mark hard";
}
$("card").onclick = ()=>{ cardFlipped = !cardFlipped; renderCard(); };
$("nextBtn").onclick = ()=>{ cardIdx=(cardIdx+1)%cardOrder.length; cardFlipped=false; renderCard(); };
$("prevBtn").onclick = ()=>{ cardIdx=(cardIdx-1+cardOrder.length)%cardOrder.length; cardFlipped=false; renderCard(); };
$("shuffleBtn").onclick = ()=>{ cardOrder=shuffle(WORDS.map(x=>x.w)); cardIdx=0; cardFlipped=false; renderCard(); };
$("hardBtn").onclick = ()=>{
  const w=currentCardWord();
  if(state.hard[w]) delete state.hard[w]; else state.hard[w]=true;
  saveState(); renderCard();
};
document.querySelectorAll("#cardDir button").forEach(b=>{
  b.onclick=()=>{
    cardDir=b.dataset.dir; cardFlipped=false;
    document.querySelectorAll("#cardDir button").forEach(x=>x.classList.toggle("on",x===b));
    renderCard();
  };
});

/* ---------- quiz ---------- */
let quizDir = "wm";
let quizAnswer = null;
let quizDone = false;

function pickDistractors(answer, n){
  // prefer decoys sharing the answer's length and/or first letter
  const pool = WORDS.filter(x=>x.w!==answer.w);
  const scored = pool.map(x=>{
    let s = 0;
    if(x.w.length === answer.w.length) s += 2;
    if(x.w[0] === answer.w[0]) s += 1;
    return {x, s, r:Math.random()};
  });
  scored.sort((a,b)=> (b.s - a.s) || (a.r - b.r));
  // take a similar-leaning subset, then randomize which n we use
  const top = scored.slice(0, Math.min(scored.length, n+6));
  return shuffle(top).slice(0,n).map(o=>o.x);
}

function newQuestion(){
  quizDone = false;
  quizAnswer = weightedPick();
  const distractors = pickDistractors(quizAnswer, 3);
  const options = shuffle([quizAnswer, ...distractors]);
  const askWord = (quizDir === "wm");   // wm: show word, choose meaning

  $("quizTag").textContent = askWord ? "What does this answer mean?" : "Which answer fits this clue?";
  $("quizPrompt").innerHTML = askWord
    ? '<div class="qword">'+quizAnswer.w+'</div>'
    : '<div class="qclue">'+quizAnswer.c+'</div>';
  $("quizFeedback").textContent = "";
  $("quizNext").style.visibility = "hidden";

  const opts = $("quizOpts");
  opts.innerHTML = "";
  options.forEach(o=>{
    const btn = document.createElement("button");
    btn.className = "opt";
    btn.textContent = askWord ? o.c : o.w;
    btn.onclick = ()=>answer(btn, o, options);
    opts.appendChild(btn);
  });
}

function answer(btn, chosen, options){
  if(quizDone) return;
  quizDone = true;
  const correct = (chosen.w === quizAnswer.w);
  const r = rec(quizAnswer.w);
  if(correct) r.right++; else r.wrong++;
  saveState();

  const askWord = (quizDir === "wm");
  const btns = Array.from($("quizOpts").children);
  btns.forEach((b,i)=>{
    b.disabled = true;
    const o = options[i];
    if(o.w === quizAnswer.w) b.classList.add("correct");
    else if(b===btn) b.classList.add("wrong");
  });
  $("quizFeedback").innerHTML = correct
    ? '<span style="color:var(--good)">Correct! ✓</span>'
    : '<span style="color:var(--bad)">'+quizAnswer.w+' = '+quizAnswer.c+'</span>';
  $("quizNext").style.visibility = "visible";
}

$("quizNext").onclick = newQuestion;
document.querySelectorAll("#quizDir button").forEach(b=>{
  b.onclick=()=>{
    quizDir=b.dataset.dir;
    document.querySelectorAll("#quizDir button").forEach(x=>x.classList.toggle("on",x===b));
    newQuestion();
  };
});

/* ---------- stats ---------- */
function renderStats(){
  let answered=0, right=0, wrong=0;
  WORDS.forEach(x=>{
    const r = state.stats[x.w]; if(!r) return;
    answered += r.right + r.wrong; right += r.right; wrong += r.wrong;
  });
  $("sAnswered").textContent = answered;
  $("sAccuracy").textContent = answered ? Math.round(100*right/answered)+"%" : "—";
  $("sMisses").textContent = wrong;

  const rows = WORDS.map(x=>{
    const r = state.stats[x.w] || {right:0,wrong:0};
    const seen = r.right + r.wrong;
    const acc = seen ? r.right/seen : 1;
    // hardest first: more wrongs, lower accuracy, and "hard"-flagged rank up
    const hardness = r.wrong*2 + (1-acc)*3 + (state.hard[x.w]?2:0);
    return {x, r, seen, acc, hardness};
  }).sort((a,b)=> b.hardness - a.hardness);

  const list = $("wlist");
  list.innerHTML = "";
  rows.forEach(row=>{
    const {x,r,seen,acc} = row;
    const gPct = seen ? Math.round(100*acc) : 0;
    const bPct = seen ? 100-gPct : 0;
    const div = document.createElement("div");
    div.className = "wrow";
    div.innerHTML =
      '<div class="w">'+x.w+(state.hard[x.w]?' <span class="h">★</span>':'')+'</div>'+
      '<div class="bar"><div class="g" style="width:'+gPct+'%"></div><div class="b" style="width:'+bPct+'%"></div></div>'+
      '<div class="cnt">✓'+r.right+' ✗'+r.wrong+'</div>';
    list.appendChild(div);
  });
}
$("resetBtn").onclick = ()=>{
  if(confirm("Reset all progress, stats, and hard marks?")){
    state = {stats:{}, hard:{}};
    saveState();
    renderStats();
    renderCard();
  }
};

/* ---------- boot ---------- */
renderCard();
newQuestion();

if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));
}
</script>
</body>
</html>
