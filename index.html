<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2563eb">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>Crossword Flashcards</title>
<style>
  :root{
    --bg:#0f172a; --panel:#1e293b; --panel2:#334155; --txt:#e2e8f0;
    --muted:#94a3b8; --accent:#2563eb; --accent2:#3b82f6;
    --good:#22c55e; --bad:#ef4444; --hard:#f59e0b;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--txt);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    display:flex; flex-direction:column;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
  }
  header{padding:14px 16px 8px;text-align:center}
  header h1{margin:0;font-size:18px;letter-spacing:.5px}
  header p{margin:2px 0 0;font-size:12px;color:var(--muted)}
  main{flex:1;overflow-y:auto;padding:8px 16px 16px}
  .tab{display:none}
  .tab.active{display:block}

  /* generic controls */
  .row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:10px 0}
  button{
    font:inherit;color:var(--txt);background:var(--panel2);border:none;
    border-radius:10px;padding:11px 14px;cursor:pointer;flex:0 0 auto;
  }
  button:active{transform:scale(.97)}
  button.primary{background:var(--accent)}
  .seg{display:inline-flex;background:var(--panel);border-radius:10px;padding:3px}
  .seg button{background:transparent;border-radius:8px;padding:8px 12px;font-size:13px}
  .seg button.on{background:var(--accent)}

  /* flashcard */
  .card{
    background:var(--panel);border-radius:18px;min-height:230px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:24px;margin:6px 0;cursor:pointer;
    box-shadow:0 8px 24px rgba(0,0,0,.35);
  }
  .card .big{font-size:40px;font-weight:700;letter-spacing:2px}
  .card .med{font-size:22px;line-height:1.35}
  .card .tag{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
  .card .hint{font-size:11px;color:var(--muted);margin-top:16px}
  .counter{text-align:center;color:var(--muted);font-size:12px;margin-top:4px}
  .hardflag{color:var(--hard);font-weight:700}

  /* quiz */
  .qword{font-size:34px;font-weight:700;letter-spacing:2px;text-align:center;margin:8px 0}
  .qclue{font-size:20px;text-align:center;margin:8px 0;line-height:1.35}
  .qtag{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;text-align:center}
  .opts{display:flex;flex-direction:column;gap:10px;margin-top:14px}
  .opt{background:var(--panel);text-align:left;padding:14px;border-radius:12px;font-size:16px}
  .opt.correct{background:var(--good);color:#04210f}
  .opt.wrong{background:var(--bad);color:#2a0707}
  .opt:disabled{opacity:1}
  .feedback{text-align:center;min-height:22px;margin-top:12px;font-weight:600}

  /* crossword spell mode */
  .cwclue{font-size:21px;text-align:center;margin:18px 8px 4px;line-height:1.35}
  .cwlen{text-align:center;color:var(--muted);font-size:12px;letter-spacing:1px;text-transform:uppercase;margin-bottom:16px}
  .cwwrap{position:relative;display:flex;justify-content:center;margin:6px 0}
  .cwboxes{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;max-width:100%}
  .cbox{
    width:46px;height:54px;border:2px solid var(--panel2);border-radius:9px;
    background:var(--panel);display:flex;align-items:center;justify-content:center;
    font-size:28px;font-weight:700;text-transform:uppercase;transition:border-color .1s,background .1s;
  }
  .cbox.active{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(59,130,246,.25)}
  .cbox.revealed{color:var(--hard)}
  .cbox.good{border-color:var(--good);background:rgba(34,197,94,.18)}
  .cbox.bad{border-color:var(--bad);background:rgba(239,68,68,.14)}
  /* invisible input overlaid on the boxes: captures typing + raises keyboard on tap */
  .cw-capture{
    position:absolute;inset:0;width:100%;height:100%;
    opacity:0;border:none;background:transparent;color:transparent;
    font-size:16px;caret-color:transparent;text-align:center;
  }
  .cwfeedback{text-align:center;min-height:22px;margin-top:16px;font-weight:600}

  /* stats */
  .summary{display:flex;gap:8px;margin:8px 0}
  .stat{flex:1;background:var(--panel);border-radius:12px;padding:12px;text-align:center}
  .stat b{display:block;font-size:22px}
  .stat span{font-size:11px;color:var(--muted)}
  .wlist{margin-top:10px}
  .wrow{display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid #1e293b}
  .wrow .w{width:62px;font-weight:700;flex:0 0 auto}
  .wrow .bar{flex:1;height:10px;border-radius:6px;background:var(--panel2);overflow:hidden;display:flex}
  .wrow .bar .g{background:var(--good)}
  .wrow .bar .b{background:var(--bad)}
  .wrow .cnt{font-size:12px;color:var(--muted);width:74px;text-align:right;flex:0 0 auto}
  .wrow .h{color:var(--hard)}

  /* dictionary button + modal */
  button.define{background:transparent;border:1.5px solid var(--panel2);color:var(--accent2)}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;z-index:50}
  .modal[hidden]{display:none}
  .sheet{
    background:var(--panel);width:100%;max-height:75vh;overflow-y:auto;
    border-radius:18px 18px 0 0;padding:16px 18px calc(18px + env(safe-area-inset-bottom));
    box-shadow:0 -8px 24px rgba(0,0,0,.45);
  }
  .sheetHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  #defWord{font-size:26px;font-weight:700;letter-spacing:1px}
  #defClose{background:var(--panel2);border-radius:50%;width:34px;height:34px;padding:0;font-size:16px;line-height:1}
  .defPhon{color:var(--muted);font-size:14px;margin-bottom:6px}
  .defPos{color:var(--accent2);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.5px;margin:12px 0 4px}
  .defList{margin:0;padding-left:20px}
  .defList li{margin:5px 0;line-height:1.4}
  .defMsg{padding:10px 0;line-height:1.5}
  .muted{color:var(--muted)}

  /* bottom nav */
  nav{
    display:flex;background:var(--panel);border-top:1px solid #334155;
    padding-bottom:env(safe-area-inset-bottom);
  }
  nav button{flex:1;background:transparent;border-radius:0;padding:12px 0;font-size:13px;color:var(--muted)}
  nav button.on{color:var(--accent2);font-weight:700}
</style>
</head>
<body>
<header>
  <h1>Crossword Flashcards</h1>
  <p>The most common NYT crossword answers</p>
</header>

<main>
  <!-- FLASHCARDS -->
  <section id="tab-cards" class="tab active">
    <div class="row">
      <div class="seg" id="cardDir">
        <button data-dir="wm" class="on">Word → Meaning</button>
        <button data-dir="mw">Meaning → Word</button>
      </div>
    </div>
    <div class="card" id="card">
      <div class="tag" id="cardTag">Word</div>
      <div class="big" id="cardFront">—</div>
      <div class="hint">Tap to flip</div>
    </div>
    <div class="counter" id="cardCounter"></div>
    <div class="row">
      <button id="prevBtn">◀ Prev</button>
      <button id="hardBtn">☆ Mark hard</button>
      <button id="nextBtn">Next ▶</button>
    </div>
    <div class="row">
      <button id="shuffleBtn">🔀 Shuffle</button>
      <button id="cardDefine" class="define">📖 Define</button>
    </div>
  </section>

  <!-- QUIZ -->
  <section id="tab-quiz" class="tab">
    <div class="row">
      <div class="seg" id="quizDir">
        <button data-dir="wm" class="on">Word → Meaning</button>
        <button data-dir="mw">Meaning → Word</button>
      </div>
    </div>
    <div class="qtag" id="quizTag"></div>
    <div id="quizPrompt"></div>
    <div class="opts" id="quizOpts"></div>
    <div class="feedback" id="quizFeedback"></div>
    <div class="row">
      <button id="quizDefine" class="define" style="visibility:hidden">📖 Define</button>
      <button class="primary" id="quizNext">Next question ▶</button>
    </div>
  </section>

  <!-- SPELL (crossword entry) -->
  <section id="tab-spell" class="tab">
    <div class="cwclue" id="cwClue"></div>
    <div class="cwlen" id="cwLen"></div>
    <div class="cwwrap">
      <div class="cwboxes" id="cwBoxes"></div>
      <input id="cwInput" class="cw-capture" type="text" inputmode="text"
             autocapitalize="characters" autocomplete="off" autocorrect="off"
             spellcheck="false" aria-label="Type the answer">
    </div>
    <div class="cwfeedback" id="cwFeedback"></div>
    <div class="row">
      <button id="cwHint">💡 Hint</button>
      <button id="cwShow">Show answer</button>
      <button id="cwSkip">Skip ▶</button>
    </div>
    <div class="row">
      <button id="cwDefine" class="define" style="visibility:hidden">📖 Define</button>
    </div>
  </section>

  <!-- STATS -->
  <section id="tab-stats" class="tab">
    <div class="summary">
      <div class="stat"><b id="sAnswered">0</b><span>answered</span></div>
      <div class="stat"><b id="sAccuracy">—</b><span>accuracy</span></div>
      <div class="stat"><b id="sMisses">0</b><span>misses</span></div>
    </div>
    <div class="wlist" id="wlist"></div>
    <div class="row">
      <button id="resetBtn">Reset all progress</button>
    </div>
  </section>
</main>

<nav id="nav">
  <button data-tab="cards" class="on">Cards</button>
  <button data-tab="quiz">Quiz</button>
  <button data-tab="spell">Spell</button>
  <button data-tab="stats">Stats</button>
</nav>

/* ---------- persistence (cw_flashcards_v2) ---------- */
const LS_KEY = "cw_flashcards_v2";
let state = loadState();
function loadState(){
  try{
    const s = JSON.parse(localStorage.getItem(LS_KEY));
    if(s && s.stats && s.hard) return s;
  }catch(e){}
  return {stats:{}, hard:{}};
}
function saveState(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){}
}
function rec(w){ return state.stats[w] || (state.stats[w] = {right:0, wrong:0}); }

/* ---------- helpers ---------- */
const $ = (id)=>document.getElementById(id);
function shuffle(a){
  a = a.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function byWord(w){ return WORDS.find(x=>x.w===w); }

/* weight a word for selection: unseen, missed, and "hard" words surface more */
function weight(w){
  const r = rec(w);
  let weight = 1;
  if(state.hard[w]) weight += 3;
  weight += r.wrong * 2;                 // missed often -> show often
  if(r.right + r.wrong === 0) weight += 2;   // never seen
  if(r.right >= 3 && r.wrong === 0) weight *= 0.25; // mastered -> show rarely
  return Math.max(0.1, weight);
}
function weightedPick(){
  const total = WORDS.reduce((s,x)=>s+weight(x.w),0);
  let t = Math.random()*total;
  for(const x of WORDS){ t -= weight(x.w); if(t<=0) return x; }
  return WORDS[WORDS.length-1];
}

/* ---------- tab switching ---------- */
document.querySelectorAll("#nav button").forEach(b=>{
  b.onclick = ()=>{
    const tab = b.dataset.tab;
    document.querySelectorAll("#nav button").forEach(x=>x.classList.toggle("on", x===b));
    document.querySelectorAll(".tab").forEach(s=>s.classList.remove("active"));
    $("tab-"+tab).classList.add("active");
    if(tab==="stats") renderStats();
    if(tab==="spell"){
      if(!cwAnswer || cwSolved) newSpell(); else renderBoxes();
      $("cwInput").focus();   // user-gesture focus -> raises mobile keyboard
    }
  };
});

/* ---------- flashcards ---------- */
let cardOrder = shuffle(WORDS.map(x=>x.w));
let cardIdx = 0;
let cardFlipped = false;
let cardDir = "wm"; // wm = word->meaning, mw = meaning->word

function currentCardWord(){ return cardOrder[cardIdx]; }
function renderCard(){
  const w = currentCardWord();
  const item = byWord(w);
  const frontIsWord = (cardDir === "wm") ? !cardFlipped : cardFlipped;
  $("cardTag").textContent = frontIsWord ? "Word" : "Clue";
  const el = $("cardFront");
  if(frontIsWord){ el.textContent = item.w; el.className = "big"; }
  else { el.textContent = item.c; el.className = "med"; }
  const hardMark = state.hard[w] ? ' <span class="hardflag">★ hard</span>' : '';
  $("cardCounter").innerHTML = (cardIdx+1)+" / "+cardOrder.length + hardMark;
  $("hardBtn").textContent = state.hard[w] ? "★ Unmark hard" : "☆ Mark hard";
}
$("card").onclick = ()=>{ cardFlipped = !cardFlipped; renderCard(); };
$("nextBtn").onclick = ()=>{ cardIdx=(cardIdx+1)%cardOrder.length; cardFlipped=false; renderCard(); };
$("prevBtn").onclick = ()=>{ cardIdx=(cardIdx-1+cardOrder.length)%cardOrder.length; cardFlipped=false; renderCard(); };
$("shuffleBtn").onclick = ()=>{ cardOrder=shuffle(WORDS.map(x=>x.w)); cardIdx=0; cardFlipped=false; renderCard(); };
$("hardBtn").onclick = ()=>{
  const w=currentCardWord();
  if(state.hard[w]) delete state.hard[w]; else state.hard[w]=true;
  saveState(); renderCard();
};
document.querySelectorAll("#cardDir button").forEach(b=>{
  b.onclick=()=>{
    cardDir=b.dataset.dir; cardFlipped=false;
    document.querySelectorAll("#cardDir button").forEach(x=>x.classList.toggle("on",x===b));
    renderCard();
  };
});

/* ---------- quiz ---------- */
let quizDir = "wm";
let quizAnswer = null;
let quizDone = false;

function pickDistractors(answer, n){
  // prefer decoys sharing the answer's length and/or first letter
  const pool = WORDS.filter(x=>x.w!==answer.w);
  const scored = pool.map(x=>{
    let s = 0;
    if(x.w.length === answer.w.length) s += 2;
    if(x.w[0] === answer.w[0]) s += 1;
    return {x, s, r:Math.random()};
  });
  scored.sort((a,b)=> (b.s - a.s) || (a.r - b.r));
  // take a similar-leaning subset, then randomize which n we use
  const top = scored.slice(0, Math.min(scored.length, n+6));
  return shuffle(top).slice(0,n).map(o=>o.x);
}

function newQuestion(){
  quizDone = false;
  quizAnswer = weightedPick();
  const distractors = pickDistractors(quizAnswer, 3);
  const options = shuffle([quizAnswer, ...distractors]);
  const askWord = (quizDir === "wm");   // wm: show word, choose meaning

  $("quizTag").textContent = askWord ? "What does this answer mean?" : "Which answer fits this clue?";
  $("quizPrompt").innerHTML = askWord
    ? '<div class="qword">'+quizAnswer.w+'</div>'
    : '<div class="qclue">'+quizAnswer.c+'</div>';
  $("quizFeedback").textContent = "";
  $("quizNext").style.visibility = "hidden";
  $("quizDefine").style.visibility = "hidden";

  const opts = $("quizOpts");
  opts.innerHTML = "";
  options.forEach(o=>{
    const btn = document.createElement("button");
    btn.className = "opt";
    btn.textContent = askWord ? o.c : o.w;
    btn.onclick = ()=>answer(btn, o, options);
    opts.appendChild(btn);
  });
}

function answer(btn, chosen, options){
  if(quizDone) return;
  quizDone = true;
  const correct = (chosen.w === quizAnswer.w);
  const r = rec(quizAnswer.w);
  if(correct) r.right++; else r.wrong++;
  saveState();

  const askWord = (quizDir === "wm");
  const btns = Array.from($("quizOpts").children);
  btns.forEach((b,i)=>{
    b.disabled = true;
    const o = options[i];
    if(o.w === quizAnswer.w) b.classList.add("correct");
    else if(b===btn) b.classList.add("wrong");
  });
  $("quizFeedback").innerHTML = correct
    ? '<span style="color:var(--good)">Correct! ✓</span>'
    : '<span style="color:var(--bad)">'+quizAnswer.w+' = '+quizAnswer.c+'</span>';
  $("quizNext").style.visibility = "visible";
  $("quizDefine").style.visibility = "visible";
}

$("quizNext").onclick = newQuestion;
document.querySelectorAll("#quizDir button").forEach(b=>{
  b.onclick=()=>{
    quizDir=b.dataset.dir;
    document.querySelectorAll("#quizDir button").forEach(x=>x.classList.toggle("on",x===b));
    newQuestion();
  };
});

/* ---------- stats ---------- */
function renderStats(){
  let answered=0, right=0, wrong=0;
  WORDS.forEach(x=>{
    const r = state.stats[x.w]; if(!r) return;
    answered += r.right + r.wrong; right += r.right; wrong += r.wrong;
  });
  $("sAnswered").textContent = answered;
  $("sAccuracy").textContent = answered ? Math.round(100*right/answered)+"%" : "—";
  $("sMisses").textContent = wrong;

  const rows = WORDS.map(x=>{
    const r = state.stats[x.w] || {right:0,wrong:0};
    const seen = r.right + r.wrong;
    const acc = seen ? r.right/seen : 1;
    // hardest first: more wrongs, lower accuracy, and "hard"-flagged rank up
    const hardness = r.wrong*2 + (1-acc)*3 + (state.hard[x.w]?2:0);
    return {x, r, seen, acc, hardness};
  }).sort((a,b)=> b.hardness - a.hardness);

  const list = $("wlist");
  list.innerHTML = "";
  rows.forEach(row=>{
    const {x,r,seen,acc} = row;
    const gPct = seen ? Math.round(100*acc) : 0;
    const bPct = seen ? 100-gPct : 0;
    const div = document.createElement("div");
    div.className = "wrow";
    div.innerHTML =
      '<div class="w">'+x.w+(state.hard[x.w]?' <span class="h">★</span>':'')+'</div>'+
      '<div class="bar"><div class="g" style="width:'+gPct+'%"></div><div class="b" style="width:'+bPct+'%"></div></div>'+
      '<div class="cnt">✓'+r.right+' ✗'+r.wrong+'</div>';
    list.appendChild(div);
  });
}
$("resetBtn").onclick = ()=>{
  if(confirm("Reset all progress, stats, and hard marks?")){
    state = {stats:{}, hard:{}};
    saveState();
    renderStats();
    renderCard();
  }
};

/* ---------- spell (crossword entry) ---------- */
let cwAnswer = null;     // current {w,c}
let cwSolved = false;
let cwReveal = 0;        // how many leading letters are revealed as hints
let cwAdvanceTimer = null;   // pending auto-advance after a correct solve

function newSpell(){
  cwAnswer = weightedPick();
  cwSolved = false;
  cwReveal = 0;
  const n = cwAnswer.w.length;
  const inp = $("cwInput");
  inp.value = "";
  inp.maxLength = n;
  $("cwClue").textContent = cwAnswer.c;
  $("cwLen").textContent = n + (n === 1 ? " letter" : " letters");
  $("cwFeedback").textContent = "";
  $("cwShow").disabled = false;
  $("cwHint").disabled = false;
  $("cwDefine").style.visibility = "hidden";
  buildBoxes();
  renderBoxes();
}

function buildBoxes(){
  const wrap = $("cwBoxes");
  wrap.innerHTML = "";
  for(let i=0;i<cwAnswer.w.length;i++){
    const d = document.createElement("div");
    d.className = "cbox";
    wrap.appendChild(d);
  }
}

function cwValue(){
  return $("cwInput").value.toUpperCase().replace(/[^A-Z]/g,"").slice(0, cwAnswer.w.length);
}

function renderBoxes(state){
  const v = cwValue();
  const boxes = $("cwBoxes").children;
  for(let i=0;i<boxes.length;i++){
    const b = boxes[i];
    b.textContent = v[i] || "";
    b.className = "cbox";
    if(i < cwReveal) b.classList.add("revealed");
    if(state) b.classList.add(state);                       // good / bad flash
    else if(!cwSolved && i === v.length) b.classList.add("active");
  }
}

function checkSpell(){
  const v = cwValue();
  if(v.length < cwAnswer.w.length) return;
  if(v === cwAnswer.w){
    cwSolved = true;
    if(cwReveal < cwAnswer.w.length){ rec(cwAnswer.w).right++; saveState(); }  // not a full give-up
    renderBoxes("good");
    $("cwFeedback").innerHTML = '<span style="color:var(--good)">Correct! ✓</span>';
    $("cwDefine").style.visibility = "visible";
    // auto-advance (keeping the keyboard up) unless the user opens the dictionary
    cwAdvanceTimer = setTimeout(()=>{ if(cwSolved){ newSpell(); $("cwInput").focus(); } }, 1600);
  } else {
    renderBoxes("bad");
    $("cwFeedback").innerHTML = '<span style="color:var(--bad)">Not quite — keep trying</span>';
  }
}

$("cwInput").addEventListener("input", ()=>{
  const inp = $("cwInput");
  let v = cwValue();
  // keep the revealed prefix locked in
  if(cwReveal > 0){
    const prefix = cwAnswer.w.slice(0, cwReveal);
    if(!v.startsWith(prefix)) v = prefix + v.slice(prefix.length);
  }
  inp.value = v;                 // normalize (uppercase, letters only)
  if(!cwSolved) $("cwFeedback").textContent = "";
  renderBoxes();
  if(v.length === cwAnswer.w.length) checkSpell();
});
// Enter key also checks
$("cwInput").addEventListener("keydown", (e)=>{ if(e.key === "Enter") checkSpell(); });

$("cwHint").onclick = ()=>{
  if(cwSolved || cwReveal >= cwAnswer.w.length) return;
  cwReveal++;
  const inp = $("cwInput");
  const tail = cwValue().slice(cwReveal);
  inp.value = (cwAnswer.w.slice(0, cwReveal) + tail).slice(0, cwAnswer.w.length);
  renderBoxes();
  $("cwInput").focus();
  if(cwValue().length === cwAnswer.w.length) checkSpell();
};

$("cwShow").onclick = ()=>{
  if(cwSolved) return;
  cwSolved = true;
  cwReveal = cwAnswer.w.length;
  $("cwInput").value = cwAnswer.w;
  rec(cwAnswer.w).wrong++; saveState();
  renderBoxes();
  $("cwFeedback").innerHTML = '<span style="color:var(--hard)">'+cwAnswer.w+' — '+cwAnswer.c+'</span>';
  $("cwDefine").style.visibility = "visible";
};

$("cwSkip").onclick = ()=>{ newSpell(); $("cwInput").focus(); };

/* ---------- dictionary lookup (shared across modes) ---------- */
let defCache = {};
try{ defCache = JSON.parse(localStorage.getItem("cw_defs_v1")) || {}; }catch(e){}
function saveDefs(){ try{ localStorage.setItem("cw_defs_v1", JSON.stringify(defCache)); }catch(e){} }

function escapeHtml(s){
  return String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
}
function clueFor(w){ const x = byWord(w); return x ? x.c : ""; }

function trimDef(data){
  const out = { phonetic:"", meanings:[] };
  for(const e of data){
    if(!out.phonetic && e.phonetic) out.phonetic = e.phonetic;
    for(const m of (e.meanings || [])){
      out.meanings.push({
        pos: m.partOfSpeech || "",
        defs: (m.definitions || []).slice(0,3).map(d=>d.definition).filter(Boolean)
      });
    }
  }
  out.meanings = out.meanings.slice(0,4);
  return out;
}

function openDefModal(word){ $("defWord").textContent = word; $("defModal").hidden = false; }
function closeDefModal(){ $("defModal").hidden = true; }
$("defClose").onclick = closeDefModal;
$("defModal").onclick = (e)=>{ if(e.target === $("defModal")) closeDefModal(); };

function renderDefinition(d){
  if(!d.meanings.length){ $("defBody").innerHTML = '<div class="defMsg">No definitions found.</div>'; return; }
  let h = d.phonetic ? '<div class="defPhon">'+escapeHtml(d.phonetic)+'</div>' : '';
  d.meanings.forEach(m=>{
    h += '<div class="defPos">'+escapeHtml(m.pos)+'</div><ol class="defList">';
    m.defs.forEach(x=>{ h += '<li>'+escapeHtml(x)+'</li>'; });
    h += '</ol>';
  });
  $("defBody").innerHTML = h;
}

async function showDefinition(word){
  if(!word) return;
  if(cwAdvanceTimer){ clearTimeout(cwAdvanceTimer); cwAdvanceTimer = null; }  // don't skip past a defined word
  openDefModal(word);
  if(defCache[word]){ renderDefinition(defCache[word]); return; }
  $("defBody").innerHTML = '<div class="defMsg muted">Looking up…</div>';
  try{
    const res = await fetch("https://api.dictionaryapi.dev/api/v2/entries/en/"+encodeURIComponent(word.toLowerCase()));
    if(!res.ok) throw new Error("not found");
    const data = await res.json();
    if(!Array.isArray(data)) throw new Error("bad");
    const d = trimDef(data);
    if(!d.meanings.length) throw new Error("empty");
    defCache[word] = d; saveDefs();
    renderDefinition(d);
  }catch(e){
    $("defBody").innerHTML =
      '<div class="defMsg">No dictionary entry for <b>'+escapeHtml(word)+'</b>.'+
      '<br><span class="muted">Many crossword answers are proper nouns or abbreviations. '+
      'Its crossword clue: “'+escapeHtml(clueFor(word))+'”.</span></div>';
  }
}

$("cardDefine").onclick = ()=> showDefinition(currentCardWord());
$("quizDefine").onclick = ()=>{ if(quizAnswer) showDefinition(quizAnswer.w); };
$("cwDefine").onclick   = ()=>{ if(cwAnswer)   showDefinition(cwAnswer.w);   };

/* ---------- boot ---------- */
renderCard();
newQuestion();

if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));
}
</script>

<div id="defModal" class="modal" hidden>
  <div class="sheet">
    <div class="sheetHead">
      <span id="defWord"></span>
      <button id="defClose" aria-label="Close">✕</button>
    </div>
    <div id="defBody"></div>
  </div>
</div>
</body>
